<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Review</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Add a Movie Review</h1>
        <form method="POST" action="/add-review" class="mt-3">
            <div class="form-group">
                <label for="movie_title">Movie Title:</label>
                <select name="movie_title" id="movie_title" class="form-control" required>
                    <option value="">-- Choose a movie --</option>
                    {% for movie in movies %}
                        <option value="{{ movie['title'] }}">{{ movie['title'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="username">Your Name:</label>
                <input type="text" name="username" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="rating">Rating (1-10):</label>
                <input type="number" name="rating" id="rating" class="form-control" min="1" max="10" required>
            </div>
            <div class="form-group">
                <label for="review_text">Review:</label>
                <textarea name="review_text" id="review_text" class="form-control" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit Review</button>
        </form>
        <a href="/" class="btn btn-secondary mt-3">Back to Home</a>
    </div>
</body>
</html>
