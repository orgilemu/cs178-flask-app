<!DOCTYPE html>
<html lang="en">
<head>
    <title>Browse by Genre</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Browse Movies by Genre</h1>

        <form method="GET" action="/genres" class="mt-3">
            <div class="form-group">
                <label for="genre_id">Select a Genre:</label>
                <select name="genre_id" id="genre_id" class="form-control">
                    <option value="">-- Choose a genre --</option>
                    {% for genre in genres %}
                        <option value="{{ genre['genre_id'] }}" {% if selected_genre == genre['genre_id']|string %}selected{% endif %}>
                            {{ genre['genre_name'] }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>

        {% if movies %}
        <h2 class="mt-4">Top 10 {{ movies[0]['genre_name'] }} Movies</h2>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Release Date</th>
                    <th>Rating</th>
                </tr>
            </thead>
            <tbody>
                {% for movie in movies %}
                <tr>
                    <td>{{ movie['title'] }}</td>
                    <td>{{ movie['release_date'] }}</td>
                    <td>{{ movie['vote_average'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% endif %}

        <a href="/" class="btn btn-secondary mt-3">Back to Home</a>
    </div>
</body>
</html>
