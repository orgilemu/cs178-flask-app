<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Review</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Edit Review for {{ review['movie_title'] }}</h1>
        <form method="POST" action="/edit-review/{{ review['review_id'] }}" class="mt-3">
            <div class="form-group">
                <label for="rating">Rating (1-10):</label>
                <input type="number" name="rating" id="rating" class="form-control" min="1" max="10" value="{{ review['rating'] }}" required>
            </div>
            <div class="form-group">
                <label for="review_text">Review:</label>
                <textarea name="review_text" id="review_text" class="form-control" rows="4" required>{{ review['review_text'] }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Update Review</button>
        </form>
        <a href="/reviews" class="btn btn-secondary mt-3">Back to Reviews</a>
    </div>
</body>
</html>
